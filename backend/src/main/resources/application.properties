# ===========================================================
# WebRTC P2P Chat - Signaling Server Configuration
# ===========================================================

# Server port
server.port=8080

# Application name
spring.application.name=p2p-chat-signaling-server

# Logging levels
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.web.socket=INFO

# Allow large WebSocket messages for potential SDP payloads
spring.websocket.max-text-message-size=65536

# CORS — development default allows all origins.
# Override via ALLOWED_ORIGINS env var; production values live in application-prod.properties.
app.cors.allowed-origins=${ALLOWED_ORIGINS:*}
