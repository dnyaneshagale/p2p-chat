# ===========================================================
# Production overrides  (activated via SPRING_PROFILES_ACTIVE=prod)
# ===========================================================

# Read port from the platform's PORT env var (Railway, Render, Fly.io, etc.)
server.port=${PORT:8080}

# Trust reverse-proxy forwarded headers (X-Forwarded-Proto, X-Forwarded-For).
# Required on Render, Railway, Fly.io etc — without this Tomcat treats the
# internal connection as plain HTTP and the WebSocket upgrade handshake fails.
server.forward-headers-strategy=NATIVE

# Tighten logging in production — no DEBUG noise
logging.level.com.chatapp=INFO
logging.level.org.springframework.web.socket=INFO

# Production CORS — set the ALLOWED_ORIGINS env var in your deployment platform.
# Multiple origins are comma-separated:
#   ALLOWED_ORIGINS=https://chat-p2p-x.web.app,https://custom.domain.com
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://chat-p2p-x.web.app}
